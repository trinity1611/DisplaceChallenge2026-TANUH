
model:
  base_model: "Qwen/Qwen2.5-3B-Instruct"
  adapter_model: "SignalAnkita/qwen_medical_finetuned"
  max_new_tokens: 12


translation:
  enabled: true

  model:
    name: "meta-llama/Llama-3.2-3B-Instruct"
    torch_dtype: "float16"
    device_map: "auto"
    hf_token: ${HF_TOKEN} # Paste your HF-Token Here

  inference:
    max_new_tokens: 1024
    temperature: 0.0
    top_p: 0.9
    top_k: 0
    repetition_penalty: 1.05
    num_beams: 1
    use_cache: true

  source_language: "hi"
  target_language: "en"
  save_column: "Translation_en"

embedding:
  model_name: "all-MiniLM-L6-v2"


paths:
  
  input_path: "../Track2_ASR/outputs/ASR/fa_asr_predictions"
  gt_path: "./data/Track_3_TI_DevData_1/Hindi/GT/gt_data_topic_identification.csv"

  topic_pred_dir: "./outputs/Prediction_topic"
  metrics_dir: "./outputs/metrics"


  topic_pred_pattern: "{rec_id}_Topic_pred.txt"
  asr_pattern: "{rec_id}_fullaudio_transcription.txt"


columns:
  rec_id: "rec_id"
  gt_summary: "gt_topics"
